# ============================================================
# Dashboard complet — 3 climatiseurs Samsung
# Style : thermostat standard HA avec icônes
# ============================================================

title: Climatisation
views:
  - title: Climatisation
    icon: mdi:air-conditioner
    cards:

      # ======================================================
      # Climatiseur de Cloé
      # ======================================================
      - type: vertical-stack
        cards:
          - type: thermostat
            entity: climate.climatiseur_de_cloe
            name: Clim Cloé
            features:
              - type: climate-hvac-modes
                style: icons
                hvac_modes:
                  - "off"
                  - cool
                  - heat
                  - auto
                  - dry
                  - fan_only
              - type: climate-fan-modes
                style: icons
                fan_modes:
                  - auto
                  - low
                  - medium
                  - high
                  - turbo
              - type: climate-swing-modes
                style: dropdown
                swing_modes:
                  - "off"
                  - vertical
                  - horizontal
                  - both

          - type: entities
            show_header_toggle: false
            entities:
              - entity: select.climatiseur_de_cloe_mode_special
                name: Mode spécial
                icon: mdi:wind-power
              - type: divider
              - entity: switch.climatiseur_de_cloe_ecran
                name: Écran
                icon: mdi:television
              - entity: switch.climatiseur_de_cloe_bip
                name: Bip sonore
                icon: mdi:volume-high
              - entity: switch.climatiseur_de_cloe_nettoyage_auto
                name: Nettoyage automatique
                icon: mdi:shimmer
              - type: divider
              - entity: sensor.climatiseur_de_cloe_humidite
                name: Humidité
                icon: mdi:water-percent
              - entity: sensor.climatiseur_de_cloe_filtre_statut
                name: État du filtre
                icon: mdi:air-filter
              - entity: sensor.climatiseur_de_cloe_filtre_usage
                name: Usure du filtre
                icon: mdi:percent

