# ============================================================
# Dashboard complet — 3 climatiseurs Samsung
# Style : thermostat standard HA avec icônes
# ============================================================

title: Climatisation
views:
  - title: Climatisation
    icon: mdi:air-conditioner
    cards:

      # ======================================================
      # Climatiseur de Cloé
      # ======================================================
      - type: vertical-stack
        cards:
          - type: thermostat
            entity: climate.climatiseur_de_cloe
            name: Clim Cloé
            features:
              - type: climate-hvac-modes
                style: icons
                hvac_modes:
                  - "off"
                  - cool
                  - heat
                  - auto
                  - dry
                  - fan_only
              - type: climate-fan-modes
                style: icons
                fan_modes:
                  - auto
                  - low
                  - medium
                  - high
                  - turbo
              - type: climate-swing-modes
                style: dropdown
                swing_modes:
                  - "off"
                  - vertical
                  - horizontal
                  - both

          - type: entities
            show_header_toggle: false
            entities:
              - entity: select.climatiseur_de_cloe_mode_special
                name: Mode spécial
                icon: mdi:wind-power
              - type: divider
              - entity: switch.climatiseur_de_cloe_ecran
                name: Écran
                icon: mdi:television
              - entity: switch.climatiseur_de_cloe_bip
                name: Bip sonore
                icon: mdi:volume-high
              - entity: switch.climatiseur_de_cloe_nettoyage_auto
                name: Nettoyage automatique
                icon: mdi:shimmer
              - type: divider
              - entity: sensor.climatiseur_de_cloe_humidite
                name: Humidité
                icon: mdi:water-percent
              - entity: sensor.climatiseur_de_cloe_filtre_etat
                name: État du filtre
                icon: mdi:air-filter
              - entity: sensor.climatiseur_de_cloe_filtre_usage
                name: Usure du filtre
                icon: mdi:percent
              - entity: sensor.climatiseur_de_cloe_filtre_capacite
                name: Capacité filtre
                icon: mdi:timer-outline
              - entity: sensor.climatiseur_de_cloe_filtre_dernier_reset
                name: Dernier reset filtre
                icon: mdi:calendar-check
              - entity: select.climatiseur_de_cloe_filtre_seuil_alarme
                name: Seuil alarme filtre
                icon: mdi:filter-cog
              - entity: button.climatiseur_de_cloe_reinitialiser_filtre
                name: Réinitialiser filtre
                icon: mdi:filter-remove
              - type: divider
              - entity: switch.climatiseur_de_cloe_nuit_tropicale
                name: Nuit tropicale
                icon: mdi:weather-night
              - entity: sensor.climatiseur_de_cloe_nuit_tropicale_niveau
                name: Niveau nuit tropicale
                icon: mdi:weather-night
              - type: divider
              - entity: sensor.climatiseur_de_cloe_diagnostic_etat
                name: Diagnostic état
                icon: mdi:stethoscope
              - entity: sensor.climatiseur_de_cloe_diagnostic_erreurs
                name: Erreurs diagnostic
                icon: mdi:alert-circle-outline
              - entity: button.climatiseur_de_cloe_lancer_le_diagnostic
                name: Lancer le diagnostic
                icon: mdi:stethoscope

